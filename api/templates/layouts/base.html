<!DOCTYPE html>
<html lang="vi" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page_title }} – Noah Retail</title>
    
    <!-- Premium Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Global CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        slate: { 850: '#1e293b', 950: '#0f172a' }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-[#f8fafc] text-slate-900 font-['Inter'] transition-all duration-300">

    {% include 'components/sidebar.html' %}

    <!-- Main Content Wrapper -->
    <main class="main-content min-h-screen transition-all duration-300">
        <!-- Top Navigation / Search -->
        <header class="h-16 border-b border-slate-200 bg-white/80 backdrop-blur-md flex items-center justify-between px-8 sticky top-0 z-40">
            <div class="flex items-center gap-4">
                <nav class="flex items-center text-sm text-slate-500 font-medium space-x-2">
                    <span class="hover:text-indigo-600 cursor-pointer text-xs">NOAH RETAIL</span>
                    <span class="text-slate-300">/</span>
                    <span class="text-slate-900 text-xs font-bold">{{ current_page | capitalize }}</span>
                </nav>
            </div>
            
            <div class="flex items-center gap-6">
                <!-- Status Badges -->
                <div class="flex items-center gap-3">
                    <div class="flex items-center gap-1.5 px-3 py-1 bg-emerald-50 text-emerald-600 rounded-full border border-emerald-100">
                        <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span>
                        <span class="text-[10px] font-bold uppercase tracking-wider">Live Stream</span>
                    </div>
                </div>

                <div class="h-8 w-[1px] bg-slate-200"></div>
                
                <!-- Quick Actions -->
                <button onclick="location.reload()" class="p-2 hover:bg-slate-100 rounded-full transition-colors text-slate-500" title="Refresh Page">
                    <i data-lucide="rotate-cw" class="w-5 h-5"></i>
                </button>
            </div>
        </header>

        <!-- Dynamic Content -->
        <div class="p-8 max-w-[1600px] mx-auto">
            {% block content %}{% endblock %}
        </div>
    </main>

    <!-- Global Components -->
    <div id="toast-container" class="fixed bottom-6 right-6 z-[9999] flex flex-col items-end"></div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
